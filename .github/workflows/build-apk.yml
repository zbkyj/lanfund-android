name: Build LanFund APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-setuptools \
            libssl-dev libffi-dev \
            wget autoconf automake libtool libtool-bin \
            liblzma-dev tk-dev uuid-dev libreadline-dev \
            libgdbm-dev libdb-dev

      - name: Install buildozer
        run: pip install buildozer Cython

      - name: Install Android SDK (directly in buildozer path)
        run: |
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          export PATH="$SDK_DIR/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root=$SDK_DIR \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Fix sdkmanager path for Buildozer
        run: |
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          # Buildozer expects sdkmanager at $ANDROID_HOME/tools/bin/
          # Modern Android SDK puts it at cmdline-tools/latest/bin/
          ln -sfn $SDK_DIR/cmdline-tools/latest $SDK_DIR/tools
          echo "=== SDK structure ==="
          ls -la $SDK_DIR/
          echo "=== sdkmanager ==="
          find $SDK_DIR -name "sdkmanager" -type f 2>/dev/null
          echo "=== aidl ==="
          find $SDK_DIR -name "aidl" -type f 2>/dev/null

      - name: Fix libtool macros for hostpython
        run: |
          # LT_SYS_SYMBOL_USCORE was removed in libtool 2.4.7+
          # Python 3.11's configure.ac still uses it
          echo 'AC_DEFUN([LT_SYS_SYMBOL_USCORE],[])' | sudo tee /usr/share/aclocal/libtool-compat.m4
          echo "=== Verifying macro install ==="
          aclocal --print-ac-dir
          ls -la /usr/share/aclocal/libtool-compat.m4

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lanfund-apk
          path: bin/*.apk
