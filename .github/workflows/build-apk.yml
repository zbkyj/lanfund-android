name: Build LanFund APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-setuptools \
            libssl-dev libffi-dev \
            wget autoconf libtool

      - name: Install buildozer
        run: pip install buildozer Cython

      - name: Install Android SDK (directly in buildozer path)
        run: |
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          export PATH="$SDK_DIR/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root=$SDK_DIR \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Verify SDK installation
        run: |
          echo "=== build-tools ==="
          ls -la ~/.buildozer/android/platform/android-sdk/build-tools/34.0.0/ | head -5
          echo "=== aidl ==="
          find ~/.buildozer/android/platform/android-sdk/build-tools -name "aidl" 2>/dev/null
          echo "=== ANDROID_HOME ==="
          echo "$HOME/.buildozer/android/platform/android-sdk"

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lanfund-apk
          path: bin/*.apk
